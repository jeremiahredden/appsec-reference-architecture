# =============================================================================
# AppSec Security Pipeline — the main security workflow.
#
# Runs on every push to main, every pull request to main, and on manual
# dispatch. Each scan job is independent so a single slow scanner does not
# serialize the others. Findings land in three places:
#
#   1. GitHub Security tab       (SARIF upload — Semgrep + Checkov)
#   2. Workflow artifacts         (per-tool JSON / SARIF, 30-day retention)
#   3. The security-summary job   (one-glance table of all job results)
#
# While the baseline is being established, scan jobs use continue-on-error
# so the whole pipeline finishes and the summary aggregates everything. Once
# the backlog is clean, flip each job's continue-on-error to false so the
# pipeline actually gates merges per policy-as-code/break-build-policy.md.
#
# Scan targets — this workflow points at demo-app/ as the primary target,
# which is the intentionally-vulnerable reference application shipped with
# this repo. When adopting into a real project, replace:
#   - demo-app/python-api/requirements.txt → the project's requirements file
#   - demo-app/node-api/                   → the project's Node workspace
#   - demo-app/                            → the project's source root
# =============================================================================

name: AppSec Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: appsec-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read                # read the code
  security-events: write        # upload SARIF to the Security tab
  pull-requests: write          # security-summary can comment on PRs
  actions: read                 # security-summary reads prior job results

jobs:

  # ---------------------------------------------------------------------------
  # 🔐 Secrets Scan — gitleaks across the git history (push) or PR diff (PR).
  # Highest-precision gate in the pipeline. A real secret is an incident, not
  # a finding, but we continue-on-error while backfilling so the rest of the
  # pipeline still runs and the summary shows a complete picture.
  # ---------------------------------------------------------------------------
  secrets-scan:
    name: 🔐 Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Equivalent of `gitleaks --config .gitleaks.toml` — allowlists the
          # intentional demo secrets under demo-app/ and secure-code-review/
          # so the pipeline passes on those files while still catching a real
          # secret committed anywhere else in the repo.
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 🔍 SAST — Semgrep against demo-app/ with the managed `p/default` ruleset
  # plus the custom rules committed to this repo. SARIF is uploaded to the
  # Security tab (`category: semgrep`) and as a workflow artifact.
  # ---------------------------------------------------------------------------
  sast:
    name: 🔍 SAST (Semgrep)
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep against demo-app/
        run: |
          # Scan target is intentionally vulnerable — findings are the point.
          # `semgrep scan` exits non-zero on findings; we explicitly treat the
          # step as successful so (a) the badge reflects "pipeline is running,
          # not pipeline is blocking" and (b) the SARIF upload step downstream
          # still executes. Findings remain fully visible in the GitHub
          # Security tab (SARIF) and as a workflow artifact.
          #
          # When adopting this workflow against a real (non-vulnerable) target,
          # drop the `|| true` so the step fails the job on any finding.
          set +e
          semgrep scan \
            --config=p/default \
            --config=devsecops-pipeline/semgrep-rules/custom-rules.yaml \
            --sarif --output=semgrep.sarif \
            --metrics=off \
            demo-app/
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::notice::Semgrep exit=$rc — findings emitted to SARIF (expected against demo-app/)"
          fi
          exit 0
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 🐍 SCA Python — pip-audit against demo-app/python-api/requirements.txt.
  # Writes machine-readable JSON as an artifact and prints the human-readable
  # summary to the step log.
  # ---------------------------------------------------------------------------
  sca-python:
    name: 🐍 SCA — Python (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit==2.*

      - name: Run pip-audit
        run: |
          pip-audit \
            --requirement demo-app/python-api/requirements.txt \
            --format json \
            --output pip-audit.json \
            --progress-spinner=off \
            || true

          echo "--- Human-readable pip-audit output ---"
          pip-audit \
            --requirement demo-app/python-api/requirements.txt \
            --progress-spinner=off \
            || true

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 📦 SCA Node — npm audit against demo-app/node-api/. Generates the lockfile
  # on the fly (no install) so the audit runs even when package-lock.json has
  # not been committed.
  # ---------------------------------------------------------------------------
  sca-node:
    name: 📦 SCA — Node (npm audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: demo-app/node-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate package-lock.json
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Run npm audit (JSON)
        run: |
          npm audit --audit-level=low --omit=dev --json > npm-audit.json || true

      - name: Run npm audit (human-readable)
        run: |
          npm audit --audit-level=low --omit=dev || true

      - name: Upload npm-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: demo-app/node-api/npm-audit.json
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 🏗️ IaC Scan — Checkov across the whole repo (Terraform, CloudFormation,
  # Kubernetes, Dockerfile, ARM). Soft-fails for now; SARIF lands in the
  # Security tab under `category: checkov`.
  # ---------------------------------------------------------------------------
  iac-scan:
    name: 🏗️ IaC Scan (Checkov)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          quiet: true
          soft_fail: true
          framework: terraform,cloudformation,kubernetes,dockerfile,arm
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Upload Checkov SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov.sarif
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 📊 Security Summary — runs after every scan job regardless of outcome.
  # Emits a formatted table to the GitHub Actions step summary and, on pull
  # requests, upserts a single sticky comment with the same content so the
  # PR stays uncluttered across reruns.
  # ---------------------------------------------------------------------------
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast, sca-python, sca-node, iac-scan]
    if: always()
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Emit summary table to step summary
        env:
          R_SECRETS: ${{ needs.secrets-scan.result }}
          R_SAST: ${{ needs.sast.result }}
          R_SCA_PY: ${{ needs.sca-python.result }}
          R_SCA_NODE: ${{ needs.sca-node.result }}
          R_IAC: ${{ needs.iac-scan.result }}
        run: |
          emoji() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⏹️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }

          {
            echo "## 🛡️ AppSec Security Pipeline — Summary"
            echo ""
            echo "| Job | Tool | Result |"
            echo "| --- | --- | --- |"
            echo "| 🔐 Secrets Scan | gitleaks   | $(emoji "$R_SECRETS") \`$R_SECRETS\` |"
            echo "| 🔍 SAST         | Semgrep    | $(emoji "$R_SAST") \`$R_SAST\` |"
            echo "| 🐍 SCA Python   | pip-audit  | $(emoji "$R_SCA_PY") \`$R_SCA_PY\` |"
            echo "| 📦 SCA Node     | npm audit  | $(emoji "$R_SCA_NODE") \`$R_SCA_NODE\` |"
            echo "| 🏗️ IaC Scan     | Checkov    | $(emoji "$R_IAC") \`$R_IAC\` |"
            echo ""
            echo "Detailed findings:"
            echo ""
            echo "- **GitHub Security tab** — SARIF from Semgrep and Checkov"
            echo "- **Workflow artifacts** — raw JSON / SARIF per tool (30-day retention)"
            echo "- **Break-build policy** — \`devsecops-pipeline/policy-as-code/break-build-policy.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "--- Printed to step summary ---"
          cat "$GITHUB_STEP_SUMMARY"

      - name: Upsert sticky summary comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const needs = ${{ toJSON(needs) }};
            const emoji = (r) =>
              r === 'success'   ? '✅'
              : r === 'failure'   ? '❌'
              : r === 'cancelled' ? '⏹️'
              : r === 'skipped'   ? '⏭️'
              : '❓';

            const labels = {
              'secrets-scan': ['🔐 Secrets Scan',  'gitleaks'],
              'sast':         ['🔍 SAST',          'Semgrep'],
              'sca-python':   ['🐍 SCA Python',    'pip-audit'],
              'sca-node':     ['📦 SCA Node',      'npm audit'],
              'iac-scan':     ['🏗️ IaC Scan',      'Checkov'],
            };

            const rows = Object.entries(labels).map(([id, [name, tool]]) => {
              const r = needs[id]?.result || 'unknown';
              return `| ${name} | ${tool} | ${emoji(r)} \`${r}\` |`;
            }).join('\n');

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;

            const header = '### 🛡️ AppSec Security Pipeline — Summary';
            const body = [
              header,
              '',
              '| Job | Tool | Result |',
              '| --- | --- | --- |',
              rows,
              '',
              `See the [full run](${runUrl}) and the "Security" tab for SARIF findings.`,
              '',
              '> Break-build rules and the exception process live in',
              '> `devsecops-pipeline/policy-as-code/break-build-policy.md`.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.startsWith(header),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
